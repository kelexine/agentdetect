name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_NET_RETRY: 3
  RUSTUP_MAX_RETRIES: 3

jobs:
  lint:
    name: fmt + clippy + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (all features)
        run: cargo clippy --all-features --workspace --all-targets -- -D warnings

      - name: cargo doc (all features, no den warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --all-features --workspace --no-deps
  test:
    name: test (toolchain=${{ matrix.toolchain }}, features=${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
        features:
          - ""
          - "http"
          - "otel"
          - "http,otel"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.toolchain }})
        run: |
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal
          rustup default ${{ matrix.toolchain }}

      - name: Compute cache key slug.
        id: slug
        run: echo "slug=$(echo '${{ matrix.features }}' | tr ',' '-')" >> "$GITHUB_OUTPUT"

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ matrix.toolchain }}-${{ steps.slug.outputs.slug }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ matrix.toolchain }}-${{ steps.slug.outputs.slug }}-
            ${{ runner.os }}-cargo-test-${{ matrix.toolchain }}-
            ${{ runner.os }}-cargo-

      - name: cargo build
        run: cargo build --workspace --features "${{ matrix.features }}" --no-default-features

      - name: cargo test
        run: cargo test --workspace --features "${{ matrix.features }}" --no-default-features
  msrv:
    name: MSRV (rust-version = 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        run: |
          rustup toolchain install 1.85 --profile minimal --component clippy
          rustup default 1.85

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-1.85-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-1.85-
            ${{ runner.os }}-cargo-

      - name: cargo build (MSRV, all features)
        run: cargo build --all-features --workspace

      - name: cargo clippy (MSRV, all features)
        run: cargo clippy --all-features --workspace --all-targets -- -D warnings
  package:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-package-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-package-
            ${{ runner.os }}-cargo-

      - name: cargo publish --dry-run (agentdetect)
        run: cargo publish --dry-run --all-features -p agentdetect

      - name: cargo publish --dry-run (workspace)
        run: cargo publish --dry-run --all-features --workspace || true
        continue-on-error: true
